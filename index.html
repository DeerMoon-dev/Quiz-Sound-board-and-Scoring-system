<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quiz Competition Soundboard</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #0a0a12;
                --surface: #13131f;
                --border: #2a2a40;
                --accent-gold: #f5c842;
                --accent-green: #2ecc71;
                --accent-red: #e74c3c;
                --accent-blue: #3498db;
                --accent-purple: #9b59b6;
                --text: #e8e8f0;
                --muted: #6b6b8a;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: "DM Sans", sans-serif;
                height: 100vh;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
                pointer-events: none;
                z-index: 0;
            }

            main {
                position: relative;
                z-index: 1;
                width: 100%;
                max-width: 1200px;
                height: 90vh;
                padding: 20px;
                display: grid;
                grid-template-columns: 1fr 380px;
                gap: 24px;
                align-items: start;
            }

            .left-col {
                display: flex;
                flex-direction: column;
                gap: 20px;
                height: 100%;
            }

            .right-col {
                display: flex;
                flex-direction: column;
                gap: 20px;
                height: 100%;
            }

            /* Timer */
            .timer-section {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 20px;
                text-align: center;
            }

            .timer-display {
                font-family: "Bebas Neue", sans-serif;
                font-size: 6rem;
                line-height: 1;
                color: var(--accent-gold);
                letter-spacing: 0.05em;
            }

            .timer-display.warning {
                color: #e67e22;
            }
            .timer-display.danger {
                color: var(--accent-red);
                animation: shake 0.4s ease-in-out infinite;
            }

            .timer-bar-container {
                width: 100%;
                height: 12px;
                background: rgba(255, 255, 255, 0.05);
                border-radius: 6px;
                margin-top: 10px;
                overflow: hidden;
                border: 1px solid var(--border);
            }

            .timer-bar {
                height: 100%;
                width: 100%;
                background: var(--accent-gold);
                transition:
                    width 1s linear,
                    background 0.3s;
                box-shadow: 0 0 10px rgba(245, 200, 66, 0.2);
            }

            .timer-bar.warning {
                background: #e67e22;
                box-shadow: 0 0 10px rgba(230, 126, 34, 0.2);
            }

            .timer-bar.danger {
                background: var(--accent-red);
                box-shadow: 0 0 10px rgba(231, 76, 60, 0.3);
            }

            @keyframes shake {
                0%,
                100% {
                    transform: translateX(0);
                }
                25% {
                    transform: translateX(-4px);
                }
                75% {
                    transform: translateX(4px);
                }
            }

            .timer-controls {
                display: flex;
                justify-content: center;
                gap: 10px;
                margin-top: 15px;
                flex-wrap: wrap;
            }

            .timer-preset {
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid var(--border);
                color: var(--muted);
                padding: 6px 12px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 0.8rem;
                font-weight: 600;
            }

            .timer-btn {
                padding: 8px 20px;
                border-radius: 8px;
                border: none;
                font-family: "Bebas Neue", sans-serif;
                font-size: 1rem;
                letter-spacing: 0.08em;
                cursor: pointer;
            }

            #startStopBtn {
                background: var(--accent-green);
                color: #0a0a12;
            }
            #resetBtn {
                background: rgba(231, 76, 60, 0.15);
                border: 1px solid var(--accent-red);
                color: var(--accent-red);
            }

            /* Soundboard */
            .section-title {
                font-family: "Bebas Neue", sans-serif;
                font-size: 1.1rem;
                letter-spacing: 0.12em;
                color: var(--muted);
                text-transform: uppercase;
                margin-bottom: 8px;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .section-title::after {
                content: "";
                flex: 1;
                height: 1px;
                background: var(--border);
            }

            .soundboard {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .sound-btn {
                position: relative;
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 15px;
                border-radius: 12px;
                border: 1px solid var(--border);
                background: var(--surface);
                cursor: pointer;
                transition: all 0.2s;
                text-align: left;
                overflow: hidden;
                color: var(--text);
            }

            .sound-btn:hover {
                transform: translateY(-2px);
            }
            .sound-icon {
                font-size: 1.8rem;
                flex-shrink: 0;
            }
            .sound-name {
                font-family: "Bebas Neue", sans-serif;
                font-size: 1.1rem;
                letter-spacing: 0.05em;
                line-height: 1.1;
            }
            .sound-desc {
                font-size: 0.7rem;
                color: var(--muted);
                margin-top: 2px;
            }
            .sound-key {
                font-size: 0.65rem;
                padding: 2px 6px;
                border-radius: 4px;
                border: 1px solid var(--border);
                color: var(--muted);
                margin-left: auto;
            }

            /* Wave animation */
            .wave-ring {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 20px;
                height: 20px;
                border-radius: 50%;
                pointer-events: none;
                display: none;
            }
            .sound-btn.playing .wave-ring {
                display: block;
                animation: ring-expand 0.8s ease-out infinite;
            }
            @keyframes ring-expand {
                0% {
                    transform: translate(-50%, -50%) scale(1);
                    opacity: 0.8;
                }
                100% {
                    transform: translate(-50%, -50%) scale(12);
                    opacity: 0;
                }
            }

            /* Team Cards */
            .team-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 20px;
                padding: 24px;
                display: flex;
                flex-direction: column;
                gap: 8px;
                transition: border-color 0.3s;
            }

            .team-card.active {
                border-color: var(--accent-gold);
                box-shadow: 0 0 15px rgba(245, 200, 66, 0.1);
            }
            .team-label {
                font-size: 0.8rem;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--muted);
            }
            .team-name {
                font-family: "Bebas Neue", sans-serif;
                font-size: 1.5rem;
                color: var(--text);
                line-height: 1.2;
            }
            .team-score {
                font-family: "Bebas Neue", sans-serif;
                font-size: 5rem;
                line-height: 1;
                color: var(--accent-gold);
                margin: 10px 0;
            }
            .score-btns {
                display: flex;
                gap: 8px;
                margin-top: 5px;
            }
            .score-btn {
                flex: 1;
                padding: 10px;
                border-radius: 8px;
                border: 1px solid var(--border);
                background: rgba(255, 255, 255, 0.04);
                color: var(--text);
                font-size: 1rem;
                cursor: pointer;
                font-weight: 600;
            }
            .score-btn:hover {
                background: rgba(245, 200, 66, 0.1);
                border-color: var(--accent-gold);
                color: var(--accent-gold);
            }

            /* Event Log Styles */
            .log-container {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 15px;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                height: 150px;
            }
            #eventLog {
                font-size: 0.8rem;
                color: var(--muted);
                overflow-y: auto;
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 6px;
                padding-right: 5px;
            }
            .log-entry {
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                padding-bottom: 4px;
            }
            .log-time {
                color: var(--accent-gold);
                margin-right: 8px;
                font-family: monospace;
            }

            .bottom-timer-bar-container {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 6px;
                background: rgba(0, 0, 0, 0.3);
                z-index: 1000;
                overflow: hidden;
            }

            .bottom-timer-bar {
                height: 100%;
                width: 100%;
                background: var(--text);
                transition:
                    width 1s linear,
                    background 0.3s;
                box-shadow: 0 0 15px rgba(245, 200, 66, 0.4);
            }

            .bottom-timer-bar.warning {
                background: #e67e22;
                box-shadow: 0 0 15px rgba(230, 126, 34, 0.4);
            }

            .bottom-timer-bar.danger {
                background: var(--accent-red);
                box-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
            }

            @media (max-width: 850px) {
                main {
                    grid-template-columns: 1fr;
                    height: auto;
                    overflow: auto;
                }
                body {
                    height: auto;
                    padding: 20px 0;
                }
            }
        </style>
    </head>
    <body>
        <main>
            <div class="left-col">
                <div class="timer-section">
                    <div class="timer-display" id="timerDisplay">00:30</div>
                    <div class="timer-bar-container">
                        <div class="timer-bar" id="timerBar"></div>
                    </div>
                    <div class="timer-controls">
                        <button class="timer-preset" onclick="setTimer(15)">
                            15s
                        </button>
                        <button class="timer-preset" onclick="setTimer(30)">
                            30s
                        </button>
                        <button class="timer-preset" onclick="setTimer(60)">
                            60s
                        </button>
                        <button class="timer-preset" onclick="setTimer(90)">
                            90s
                        </button>
                        <button
                            class="timer-btn"
                            id="startStopBtn"
                            onclick="toggleTimer()"
                        >
                            ▶ START
                        </button>
                        <button
                            class="timer-btn"
                            id="resetBtn"
                            onclick="resetTimer()"
                        >
                            ↺ RESET
                        </button>
                    </div>
                </div>

                <div class="section-title">Sound Board</div>
                <div class="soundboard">
                    <button class="sound-btn" onclick="playSound('correct')">
                        <div class="wave-ring"></div>
                        <span
                            class="sound-icon"
                            style="color: var(--accent-green)"
                            >✅</span
                        >
                        <div class="sound-info">
                            <div class="sound-name">Correct Answer!</div>
                            <div class="sound-desc">Team answers correctly</div>
                        </div>
                        <span class="sound-key">C</span>
                    </button>

                    <button class="sound-btn" onclick="playSound('buzzer')">
                        <div class="wave-ring"></div>
                        <span
                            class="sound-icon"
                            style="color: var(--accent-red)"
                            >❌</span
                        >
                        <div class="sound-info">
                            <div class="sound-name">Wrong Answer!</div>
                            <div class="sound-desc">Answer is incorrect</div>
                        </div>
                        <span class="sound-key">X</span>
                    </button>

                    <button class="sound-btn" onclick="playSound('heartbeat')">
                        <div class="wave-ring"></div>
                        <span
                            class="sound-icon"
                            style="color: var(--accent-blue)"
                            >💓</span
                        >
                        <div class="sound-info">
                            <div class="sound-name">Tension Build</div>
                            <div class="sound-desc">Build suspense</div>
                        </div>
                        <span class="sound-key">H</span>
                    </button>

                    <button class="sound-btn" onclick="playSound('whoosh')">
                        <div class="wave-ring"></div>
                        <span
                            class="sound-icon"
                            style="color: var(--accent-purple)"
                            >🎬</span
                        >
                        <div class="sound-info">
                            <div class="sound-name">Dramatic Intro</div>
                            <div class="sound-desc">Reveal / Start</div>
                        </div>
                        <span class="sound-key">W</span>
                    </button>
                </div>
                <div class="section-title">Event Log</div>
                <div class="log-container">
                    <div id="eventLog">
                        <div class="log-entry">System ready.</div>
                    </div>
                </div>
            </div>

            <div class="right-col">
                <div class="section-title">Scores</div>
                <div class="team-card active" id="team1card">
                    <span class="team-label">AnalytiQ Team A</span>
                    <div class="team-name">Royal College Colombo</div>
                    <div class="team-score" id="score1">0</div>
                    <div class="score-btns">
                        <button class="score-btn" onclick="changeScore(1, 10)">
                            +10
                        </button>
                        <button class="score-btn" onclick="changeScore(1, 5)">
                            +5
                        </button>
                        <button class="score-btn" onclick="changeScore(1, -10)">
                            −10
                        </button>
                    </div>
                </div>

                <div class="team-card" id="team2card">
                    <span class="team-label">AnalytiQ Team B</span>
                    <div class="team-name">Dharmaraja College Kandy</div>
                    <div class="team-score" id="score2">0</div>
                    <div class="score-btns">
                        <button class="score-btn" onclick="changeScore(2, 10)">
                            +10
                        </button>
                        <button class="score-btn" onclick="changeScore(2, 5)">
                            +5
                        </button>
                        <button class="score-btn" onclick="changeScore(2, -10)">
                            −10
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <div class="bottom-timer-bar-container">
            <div class="bottom-timer-bar" id="bottomTimerBar"></div>
        </div>

            };

            const audioObjects = {};
            for (const name in audioData) {
                audioObjects[name] = new Audio(audioData[name]);
            }

            // ---- State ----
            let scores = [0, 0];
            let timeLeft = 30;
            let timerDuration = 30;
            let timerInterval = null;
            let volume = 0.8;

            // ---- Timer Functions ----
            function updateTimerUI() {
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                const display = `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
                document.getElementById("timerDisplay").textContent = display;

                const percent = (timeLeft / timerDuration) * 100;
                const bar = document.getElementById("timerBar");
                const bottomBar = document.getElementById("bottomTimerBar");

                [bar, bottomBar].forEach((b) => {
                    b.style.width = `${percent}%`;
                    b.classList.toggle(
                        "warning",
                        percent <= 50 && percent > 20,
                    );
                    b.classList.toggle("danger", percent <= 20);
                });

                const displayEl = document.getElementById("timerDisplay");
                displayEl.classList.toggle(
                    "warning",
                    percent <= 50 && percent > 20,
                );
                displayEl.classList.toggle("danger", percent <= 20);
            }

            function setTimer(seconds) {
                clearInterval(timerInterval);
                timerInterval = null;
                timerDuration = seconds;
                timeLeft = seconds;
                document.getElementById("startStopBtn").textContent = "▶ START";
                updateTimerUI();
                logEvent(`Timer set to ${seconds}s`);
            }

            function toggleTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    document.getElementById("startStopBtn").textContent =
                        "▶ START";
                    logEvent("Timer paused");
                } else {
                    if (timeLeft <= 0) resetTimer();
                    timerInterval = setInterval(() => {
                        timeLeft--;
                        updateTimerUI();
                        if (timeLeft < 10 && timeLeft > 0) {
                            playSound("heartbeat", true);
                        }
                        if (timeLeft <= 0) {
                            clearInterval(timerInterval);
                            timerInterval = null;
                            logEvent("Time's up!");
                            document.getElementById("startStopBtn").textContent =
                                "▶ START";
                        }
                    }, 1000);
                    document.getElementById("startStopBtn").textContent =
                        "Ⅱ PAUSE";
                    logEvent("Timer started");
                }
            }

            function resetTimer() {
                clearInterval(timerInterval);
                timerInterval = null;
                timeLeft = timerDuration;
                document.getElementById("startStopBtn").textContent = "▶ START";
                updateTimerUI();
                logEvent("Timer reset");
            }

            // ---- Sound & Score ----
            function playSound(name, silent = false) {
                const audio = audioObjects[name];
                if (!audio) return;
                audio.currentTime = 0;
                audio.volume = volume;
                audio.play();
                if (!silent) {
                    logEvent(`Sound played: ${name}`);
                }
            }

            function updateScoreUI() {
                document.getElementById("score1").textContent = scores[0];
                document.getElementById("score2").textContent = scores[1];
                document
                    .getElementById("team1card")
                    .classList.toggle("active", scores[0] >= scores[1]);
                document
                    .getElementById("team2card")
                    .classList.toggle("active", scores[1] > scores[0]);
            }

            function changeScore(team, delta) {
                scores[team - 1] = Math.max(0, scores[team - 1] + delta);
                updateScoreUI();
                logEvent(
                    `Team ${team === 1 ? "A" : "B"} score ${delta > 0 ? "+" : ""}${delta} (Total: ${scores[team - 1]})`,
                );
                if (delta > 0) playSound("correct");
            }

            // ---- Log Function ----
            function logEvent(msg) {
                console.log("Event: " + msg);
                const log = document.getElementById("eventLog");
                const entry = document.createElement("div");
                entry.className = "log-entry";
                const now = new Date();
                const timeStr =
                    now.getHours().toString().padStart(2, "0") +
                    ":" +
                    now.getMinutes().toString().padStart(2, "0") +
                    ":" +
                    now.getSeconds().toString().padStart(2, "0");

                entry.innerHTML = `<span class="log-time">[${timeStr}]</span> ${msg}`;
                log.prepend(entry); // Newest at top
            }

            // ---- Keyboard Shortcuts ----
            document.addEventListener("keydown", (e) => {
                switch (e.key.toLowerCase()) {
                    case "c":
                        playSound("correct");
                        break;
                    case "x":
                        playSound("buzzer");
                        break;
                    case "h":
                        playSound("heartbeat");
                        break;
                    case "w":
                        playSound("whoosh");
                        break;
                    case " ":
                        e.preventDefault();
                        toggleTimer();
                        break;
                }
            });

            updateTimerUI();
        </script>
